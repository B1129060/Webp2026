<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex9 Flickr Photo Wall</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous"
    >

    <style>
        .gallery {
            --g: 6px;
            display: grid;
            width: 1200px;
            max-width: 100%;
            aspect-ratio: 1;
            grid: auto-flow 1fr / repeat(3, 1fr);
            gap: var(--g);
            margin: 20px auto;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale();
            cursor: pointer;
            transition: .5s;
        }

        .gallery img:hover {
            filter: grayscale(0);
        }

        .gallery img:nth-child(2) {
            grid-area: 1 / 2 / span 2 / span 2;
            clip-path: polygon(
                0 0,
                100% 0,
                100% 100%,
                calc(50% + var(--g) / 4) 100%,
                0 calc(50% - var(--g) / 4)
            );
        }

        .gallery img:nth-child(3) {
            grid-area: 2 / 1 / span 2 / span 2;
            clip-path: polygon(
                0 0,
                calc(50% - var(--g) / 4) 0,
                100% calc(50% + var(--g) / 4),
                100% 100%,
                0 100%
            );
        }
    </style>
</head>
<body>
    <div class="container text-center mt-4">
        <h2 class="mb-3">ex9 Flickr Photo Wall</h2>
        <button class="btn btn-primary" onclick="getimg()">Get IMG</button>
    </div>

    <div id="gallery" class="gallery"></div>

    <script src="script.js"></script>
</body>
</html>
