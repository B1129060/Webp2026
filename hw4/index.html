<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HW4 景點觀光展覽資訊</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
    crossorigin="anonymous"
  />
  <style>
    body {
      padding: 24px;
      background: #ffffff;
    }
    .page-wrap {
      max-width: 980px;
      margin: 0 auto;
    }
    .title-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .title-row h1 {
      font-size: 2rem;
      margin: 0;
      font-weight: 700;
    }
    .search-box {
      width: 220px;
    }
    .pagination-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }
    .status-text {
      min-width: 90px;
      text-align: center;
    }
    .loading-text {
      color: #6c757d;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="title-row">
      <h1>景點觀光展覽資訊</h1>
      <input
        id="searchInput"
        class="form-control search-box"
        type="text"
        placeholder="輸入名稱關鍵字"
      />
    </div>

    <table id="csie" class="table table-striped table-hover">
      <thead class="table-success">
        <tr>
          <th>名稱</th>
          <th>地點</th>
          <th>票價</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div class="pagination-bar">
      <button id="prevBtn" class="btn btn-outline-secondary btn-sm">上一頁</button>
      <div id="pageInfo" class="status-text">1 / 1 頁</div>
      <button id="nextBtn" class="btn btn-outline-secondary btn-sm">下一頁</button>
    </div>

    <div id="loadingText" class="loading-text">資料載入中...</div>
  </div>

  <script>
    const openUrl =
      "https://cloud.culture.tw/frontsite/trans/SearchShowAction.do?method=doFindTypeJ&category=6";

    const pageSize = 10;
    let allData = [];
    let filteredData = [];
    let currentPage = 1;

    const tableBody = document.getElementById("tableBody");
    const searchInput = document.getElementById("searchInput");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pageInfo = document.getElementById("pageInfo");
    const loadingText = document.getElementById("loadingText");

    function fetchData() {
      const xhr = new XMLHttpRequest();
      xhr.open("GET", openUrl, true);
      xhr.send();

      xhr.onreadystatechange = function () {
        if (this.readyState === 4) {
          if (this.status === 200) {
            allData = JSON.parse(this.responseText);
            filteredData = allData.slice();
            currentPage = 1;
            renderTable();
            updatePageInfo();
            updateButtons();
            loadingText.innerText = "";
          } else {
            loadingText.innerText = "資料載入失敗";
          }
        }
      };
    }

    function renderTable() {
      tableBody.innerHTML = "";

      const startIndex = (currentPage - 1) * pageSize;
      const endIndex = startIndex + pageSize;
      const pageData = filteredData.slice(startIndex, endIndex);

      pageData.forEach(function (data) {
        const row = tableBody.insertRow(-1);

        const title = data.title || "";
        const location =
          data.showInfo && data.showInfo.length > 0
            ? (data.showInfo[0].location || "")
            : "";
        const price =
          data.showInfo && data.showInfo.length > 0
            ? (data.showInfo[0].price || "")
            : "";

        row.insertCell(0).textContent = title;
        row.insertCell(1).textContent = location;
        row.insertCell(2).textContent = price;
      });

      if (pageData.length === 0) {
        const row = tableBody.insertRow(-1);
        const cell = row.insertCell(0);
        cell.colSpan = 3;
        cell.textContent = "查無資料";
        cell.className = "text-center text-muted";
      }
    }

    function getTotalPages() {
      const total = Math.ceil(filteredData.length / pageSize);
      return total > 0 ? total : 1;
    }

    function updatePageInfo() {
      pageInfo.textContent = currentPage + " / " + getTotalPages() + " 頁";
    }

    function updateButtons() {
      const totalPages = getTotalPages();
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
    }

    function applySearch() {
      const keyword = searchInput.value.trim();

      filteredData = allData.filter(function (item) {
        const title = item.title || "";
        return title.includes(keyword);
      });

      currentPage = 1;
      renderTable();
      updatePageInfo();
      updateButtons();
    }

    prevBtn.addEventListener("click", function () {
      if (currentPage > 1) {
        currentPage--;
        renderTable();
        updatePageInfo();
        updateButtons();
      }
    });

    nextBtn.addEventListener("click", function () {
      if (currentPage < getTotalPages()) {
        currentPage++;
        renderTable();
        updatePageInfo();
        updateButtons();
      }
    });

    searchInput.addEventListener("change", function () {
      applySearch();
    });

    fetchData();
  </script>
</body>
</html>
